<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>sound grid</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000;
      --fg: #fff;
      --border: rgba(255,255,255,0.15);
      --dim: rgba(255,255,255,0.35);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Shippori Mincho', serif;
      overflow: hidden;
    }

    .page {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(1rem, 3vh, 2rem);
      padding: 1.5rem;
    }

    header {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    header h1 {
      font-size: clamp(1rem, 3vw, 1.4rem);
      font-weight: 400;
      letter-spacing: 0.4em;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    .status {
      font-size: clamp(0.6rem, 1.5vw, 0.75rem);
      letter-spacing: 0.2em;
      color: var(--dim);
      min-height: 1.2em;
    }

    .listeners {
      font-size: clamp(0.55rem, 1.4vw, 0.65rem);
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.2);
      min-height: 1em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(4px, 1vmin, 8px);
      width: min(calc(100vw - 3rem), calc(100vh - 10rem), 400px);
    }

    .btn {
      aspect-ratio: 1;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--fg);
      font-family: 'Shippori Mincho', serif;
      font-size: clamp(0.65rem, 2.8vmin, 1rem);
      letter-spacing: 0.08em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      position: relative;
      overflow: hidden;
      transition: background 0.06s, color 0.06s, border-color 0.06s;
    }

    /* ripple layer for remote taps */
    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.35s;
      pointer-events: none;
    }

    /* local tap — full invert */
    .btn.local {
      background: var(--fg);
      color: var(--bg);
      border-color: var(--fg);
    }

    /* remote tap — subtle glow */
    .btn.remote {
      border-color: rgba(255,255,255,0.6);
    }
    .btn.remote::after {
      background: rgba(255,255,255,0.1);
    }

    footer {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
    }

    .back-link {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.18);
      text-decoration: none;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      transition: color 0.2s;
    }
    .back-link:hover { color: rgba(255,255,255,0.5); }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1>sound grid</h1>
      <p class="status" id="status">接続中…</p>
      <p class="listeners" id="listeners"></p>
    </header>

    <div class="grid" id="grid"></div>

    <footer>
      <a class="back-link" href="index.html">← portfolio</a>
    </footer>
  </div>

  <!-- MQTT.js — public broker, no account needed -->
  <script src="https://cdn.jsdelivr.net/npm/mqtt@5/dist/mqtt.min.js"></script>
  <script>
    // ── Room ID ─────────────────────────────────────────────
    // このルームIDを変えると独立した部屋になります
    const ROOM = 'masui-portfolio-sg-v1';
    // ────────────────────────────────────────────────────────

    const TOPIC_TAPS     = `${ROOM}/taps`;
    const TOPIC_PRESENCE = `${ROOM}/presence`;

    const SESSION_ID = Math.random().toString(36).slice(2, 10);
    const presenceMap = new Map(); // sid → lastSeen (ms)

    let audioCtx = null;
    let audioUnlocked = false;
    let mqttClient = null;

    // ── わからない audio file ──
    let wakaranaiBuf = null;   // decoded AudioBuffer
    let wakaranaiPending = null; // raw ArrayBuffer waiting for AudioContext

    fetch('assets/sounds/wakaranai.m4a')
      .then(r => r.arrayBuffer())
      .then(ab => {
        if (audioCtx) {
          audioCtx.decodeAudioData(ab).then(buf => { wakaranaiBuf = buf; }).catch(() => {});
        } else {
          wakaranaiPending = ab; // decode later, on first gesture
        }
      })
      .catch(() => {});

    // ── Audio unlock ──
    // iOS Safari requires a BufferSource to be started synchronously
    // within a user gesture before any other audio will play.

    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        // decode pending file now that AudioContext exists
        if (wakaranaiPending) {
          audioCtx.decodeAudioData(wakaranaiPending)
            .then(buf => { wakaranaiBuf = buf; })
            .catch(() => {});
          wakaranaiPending = null;
        }
      }
      if (!audioUnlocked) {
        try {
          const buf = audioCtx.createBuffer(1, 1, audioCtx.sampleRate);
          const src = audioCtx.createBufferSource();
          src.buffer = buf;
          src.connect(audioCtx.destination);
          src.start(0); // synchronous — unlocks iOS
        } catch (_) {}
        audioUnlocked = true;
      }
      return audioCtx;
    }

    // ── Sound synthesis ──

    function osc(ac, freq, type, t, vol, dur) {
      const o = ac.createOscillator();
      const g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = type;
      o.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(Math.min(vol * 0.55, 0.55), t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.start(t); o.stop(t + dur + 0.02);
    }

    function noiseBlast(ac, t, dur, vol) {
      const len = Math.ceil(ac.sampleRate * dur);
      const buf = ac.createBuffer(1, len, ac.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
      const src = ac.createBufferSource();
      src.buffer = buf;
      const g = ac.createGain();
      src.connect(g); g.connect(ac.destination);
      g.gain.setValueAtTime(vol * 0.45, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      src.start(t);
    }

    // Schedule the actual note nodes — called after context is confirmed running
    function scheduleSound(id) {
      const ac = audioCtx;
      const t = ac.currentTime + 0.01;
      switch (id) {
        case 0: // なとく — C5→A4 nod
          osc(ac, 523, 'sine', t, 0.9, 0.22);
          osc(ac, 440, 'sine', t + 0.18, 0.7, 0.38);
          break;
        case 1: // びっくり — sharp sting
          osc(ac, 1320, 'square', t, 0.5, 0.07);
          osc(ac, 660,  'sine',   t + 0.04, 0.6, 0.28);
          break;
        case 2: // いいね — C–E–G arpeggio
          osc(ac, 523, 'sine', t,      0.7,  0.18);
          osc(ac, 659, 'sine', t + 0.1, 0.75, 0.2);
          osc(ac, 784, 'sine', t + 0.2, 0.9,  0.38);
          break;
        case 3: // はげます — power chord + punch
          osc(ac, 220, 'sawtooth', t, 0.35, 0.35);
          osc(ac, 330, 'sawtooth', t, 0.35, 0.35);
          osc(ac, 440, 'sawtooth', t, 0.35, 0.35);
          osc(ac, 523, 'sine', t + 0.14, 0.85, 0.32);
          break;
        case 4: { // わからない — audio file
          if (wakaranaiBuf) {
            const src = ac.createBufferSource();
            src.buffer = wakaranaiBuf;
            src.connect(ac.destination);
            src.start(t);
          }
          break;
        }
        case 5: // しずかに — soft pad
          osc(ac, 220, 'sine', t,       0.25, 1.6);
          osc(ac, 330, 'sine', t + 0.06, 0.18, 1.5);
          osc(ac, 440, 'sine', t + 0.12, 0.12, 1.4);
          break;
        case 6: // わらう — ha-ha staccato
          [0, 0.19, 0.38].forEach((dt, i) =>
            osc(ac, 523 + i * 90, 'sine', t + dt, 0.85, 0.13));
          break;
        case 7: // パチパチ — clap noise
          noiseBlast(ac, t,       0.1, 0.85);
          noiseBlast(ac, t + 0.22, 0.1, 0.85);
          noiseBlast(ac, t + 0.44, 0.1, 0.85);
          break;
        case 8: { // あおる — rising sweep
          const o = ac.createOscillator();
          const g = ac.createGain();
          o.connect(g); g.connect(ac.destination);
          o.type = 'sawtooth';
          o.frequency.setValueAtTime(130, t);
          o.frequency.exponentialRampToValueAtTime(1600, t + 0.55);
          g.gain.setValueAtTime(0.38, t);
          g.gain.setValueAtTime(0.38, t + 0.45);
          g.gain.exponentialRampToValueAtTime(0.0001, t + 0.58);
          o.start(t); o.stop(t + 0.62);
          break;
        }
      }
    }

    // ── Build grid ──

    const BUTTONS = [
      'なとく', 'びっくり', 'いいね',
      'はげます', 'わからない', 'しずかに',
      'わらう', 'パチパチ', 'あおる',
    ];

    const gridEl = document.getElementById('grid');
    const btnEls = [];

    BUTTONS.forEach((label, i) => {
      const btn = document.createElement('button');
      btn.className = 'btn';
      btn.textContent = label;
      btn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        tap(i, true);
      });
      gridEl.appendChild(btn);
      btnEls.push(btn);
    });

    function playSound(id) {
      const ac = ensureAudio(); // create + unlock synchronously
      if (ac.state === 'suspended') {
        // resume is async; schedule the sound once it resolves
        ac.resume().then(() => scheduleSound(id));
      } else {
        scheduleSound(id);
      }
    }

    function tap(id, isLocal) {
      playSound(id);
      flash(id, isLocal ? 'local' : 'remote');
      if (isLocal && mqttClient?.connected) {
        mqttClient.publish(TOPIC_TAPS, JSON.stringify({ b: id, sid: SESSION_ID }));
      }
    }

    function flash(id, cls) {
      const btn = btnEls[id];
      btn.classList.add(cls);
      setTimeout(() => btn.classList.remove(cls), cls === 'local' ? 200 : 420);
    }

    // ── Presence / listener count ──

    function updateListenerCount() {
      const now = Date.now();
      for (const [sid, ts] of presenceMap) {
        if (now - ts > 90_000) presenceMap.delete(sid);
      }
      const n = presenceMap.size;
      document.getElementById('listeners').textContent =
        n <= 1 ? '誰も聴いていません' : `${n} 人が聴いています`;
    }

    function publishPresence() {
      presenceMap.set(SESSION_ID, Date.now());
      updateListenerCount();
      if (mqttClient?.connected) {
        mqttClient.publish(TOPIC_PRESENCE, JSON.stringify({ sid: SESSION_ID }));
      }
    }

    // ── MQTT connection ──

    function initMQTT() {
      const client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt', {
        clientId: `sg_${SESSION_ID}`,
        clean: true,
        connectTimeout: 10_000,
        reconnectPeriod: 3_000,
        // Last Will: ブラウザが突然閉じられたとき自動でleaveを通知
        will: {
          topic: TOPIC_PRESENCE,
          payload: JSON.stringify({ sid: SESSION_ID, leave: true }),
          qos: 0,
          retain: false,
        },
      });

      mqttClient = client;

      client.on('connect', () => {
        client.subscribe([TOPIC_TAPS, TOPIC_PRESENCE]);
        document.getElementById('status').textContent = '接続済';
        publishPresence();
      });

      client.on('reconnect', () => {
        document.getElementById('status').textContent = '再接続中…';
      });

      client.on('offline', () => {
        document.getElementById('status').textContent = '— offline —';
      });

      client.on('message', (topic, payload) => {
        let msg;
        try { msg = JSON.parse(payload.toString()); } catch { return; }

        if (topic === TOPIC_TAPS) {
          if (msg.sid !== SESSION_ID) tap(msg.b, false);

        } else if (topic === TOPIC_PRESENCE) {
          if (msg.leave) {
            presenceMap.delete(msg.sid);
          } else {
            presenceMap.set(msg.sid, Date.now());
          }
          updateListenerCount();
        }
      });

      // presence heartbeat every 20s
      setInterval(publishPresence, 20_000);

      window.addEventListener('beforeunload', () => {
        client.publish(
          TOPIC_PRESENCE,
          JSON.stringify({ sid: SESSION_ID, leave: true }),
          { qos: 0 }
        );
      });
    }

    try {
      initMQTT();
    } catch (e) {
      // MQTT library not available — solo mode (sounds still work locally)
      document.getElementById('status').textContent = '— solo mode —';
    }
  </script>
</body>
</html>
