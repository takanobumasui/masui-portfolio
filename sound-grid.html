<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>sound grid</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000;
      --fg: #fff;
      --border: rgba(255,255,255,0.15);
      --dim: rgba(255,255,255,0.35);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Shippori Mincho', serif;
      overflow: hidden;
    }

    .page {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(1rem, 3vh, 2rem);
      padding: 1.5rem;
    }

    header {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    header h1 {
      font-size: clamp(1rem, 3vw, 1.4rem);
      font-weight: 400;
      letter-spacing: 0.4em;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    .status {
      font-size: clamp(0.6rem, 1.5vw, 0.75rem);
      letter-spacing: 0.2em;
      color: var(--dim);
      min-height: 1.2em;
      transition: color 0.3s;
    }
    .status.is-connecting   { color: #fbbf24; }
    .status.is-reconnecting { color: #fbbf24; }
    .status.is-connected    { color: #00b4d8; }

    .listeners {
      font-size: clamp(0.55rem, 1.4vw, 0.65rem);
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.2);
      min-height: 1em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(4px, 1vmin, 8px);
      width: min(calc(100vw - 3rem), calc(100vh - 10rem), 400px);
    }

    .btn {
      aspect-ratio: 1;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--fg);
      font-family: 'Shippori Mincho', serif;
      font-size: clamp(0.65rem, 2.8vmin, 1rem);
      letter-spacing: 0.08em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      position: relative;
      overflow: hidden;
      transition: background 0.06s, color 0.06s, border-color 0.06s;
    }

    /* ripple layer for remote taps */
    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.35s;
      pointer-events: none;
    }

    /* local tap — full invert */
    .btn.local {
      background: var(--fg);
      color: var(--bg);
      border-color: var(--fg);
    }

    /* remote tap — subtle glow */
    .btn.remote {
      border-color: rgba(255,255,255,0.6);
    }
    .btn.remote::after {
      background: rgba(255,255,255,0.1);
    }

    .send-bar {
      display: flex;
      gap: 6px;
      width: min(calc(100vw - 3rem), calc(100vh - 10rem), 400px);
    }

    .send-bar input {
      flex: 1;
      min-width: 0;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--fg);
      padding: 0 0.8rem;
      height: 44px;
      font-family: 'Shippori Mincho', serif;
      font-size: clamp(0.8rem, 3vmin, 1rem);
      letter-spacing: 0.08em;
      outline: none;
      -webkit-appearance: none;
      border-radius: 0;
    }

    .send-bar input::placeholder {
      color: rgba(255,255,255,0.18);
      font-size: 0.7em;
    }

    .send-bar input:focus {
      border-color: rgba(255,255,255,0.4);
    }

    .send-bar button {
      background: transparent;
      border: 1px solid var(--border);
      color: rgba(255,255,255,0.5);
      height: 44px;
      padding: 0 1.2rem;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.2s, border-color 0.2s;
      -webkit-appearance: none;
      border-radius: 0;
    }

    .send-bar button:hover,
    .send-bar button:active {
      color: var(--fg);
      border-color: rgba(255,255,255,0.5);
    }
    #overlay {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.9rem;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.3s ease;
    }
    #overlay-status {
      font-size: clamp(0.6rem, 2vw, 0.72rem);
      letter-spacing: 0.25em;
      color: #fbbf24;
      transition: color 0.3s;
    }
    #overlay-status.is-connected { color: #00b4d8; }
    #overlay-hint {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 300;
      font-size: clamp(1rem, 4vw, 1.4rem);
      letter-spacing: 0.4em;
      color: rgba(255,255,255,0.8);
    }

  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1>sound grid</h1>
      <p class="status is-connecting" id="status">接続中…</p>
      <p class="listeners" id="listeners"></p>
    </header>

    <div class="grid" id="grid"></div>

    <div class="send-bar">
      <input id="textInput" type="text" maxlength="7" placeholder="ひらがな（7文字まで）" autocomplete="off" autocorrect="off" spellcheck="false">
      <button id="sendBtn">send</button>
    </div>
  </div>

  <div id="overlay">
    <p id="overlay-status">接続中…</p>
    <p id="overlay-hint">タップして開始</p>
  </div>

  <!-- MQTT.js — public broker, no account needed -->
  <script src="https://cdn.jsdelivr.net/npm/mqtt@5/dist/mqtt.min.js"></script>
  <script>
    // ── Room ID ─────────────────────────────────────────────
    // このルームIDを変えると独立した部屋になります
    const ROOM = 'masui-portfolio-sg-v1';
    // ────────────────────────────────────────────────────────

    const TOPIC_TAPS     = `${ROOM}/taps`;
    const TOPIC_PRESENCE = `${ROOM}/presence`;
    const TOPIC_TEXTS    = `${ROOM}/texts`;

    const SESSION_ID = Math.random().toString(36).slice(2, 10);
    const presenceMap = new Map(); // sid → lastSeen (ms)

    let ctx = null;      // AudioContext — synthesized sounds only
    let mqttClient = null;

    // ── File sounds: HTML Audio ignores the iOS mute (silent) switch ──
    const wakaranaiAudio = new Audio('assets/sounds/wakaranai.m4a');
    const aoruAudio      = new Audio('assets/sounds/aoru.m4a');
    const hagemasuAudio  = new Audio('assets/sounds/hagemasu.m4a');

    // ── 裏コード ─────────────────────────────────────────────
    // キー: 送信テキスト（スペース無視・完全一致）
    // 値: 音声ファイルパス
    const SECRET_CODES = {
      'ちゃんみな': 'assets/sounds/secret_chanmina.m4a',
      // 追加: 'キーワード': 'assets/sounds/ファイル名.m4a',
    };
    // ────────────────────────────────────────────────────────

    const secretAudios = new Map();
    Object.entries(SECRET_CODES).forEach(([key, url]) => {
      secretAudios.set(key, new Audio(url));
    });

    // Unlock the iOS audio session with a separate silent dummy element.
    // Using a dummy avoids AbortError when the actual element's play()
    // is called in the same gesture (same tap = unlock + playback).
    const _silentAudio = new Audio('data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA');
    let htmlAudioUnlocked = false;
    function unlockHTMLAudio() {
      if (htmlAudioUnlocked) return;
      htmlAudioUnlocked = true;
      _silentAudio.play().catch(() => {});
    }

    // ── AudioContext init — for synthesized sounds only ──
    function initCtx() {
      if (ctx) return;
      try {
        ctx = new (window.AudioContext || window.webkitAudioContext)();
        const b = ctx.createBuffer(1, 1, ctx.sampleRate);
        const s = ctx.createBufferSource();
        s.buffer = b; s.connect(ctx.destination); s.start(0);
        ctx.resume();
      } catch (_) {}
    }
    document.addEventListener('pointerdown', () => { initCtx(); unlockHTMLAudio(); }, { capture: true, once: true });

    // ── Overlay ──
    // Dismisses when BOTH conditions are met:
    //   1. user tapped  → audio unlocked
    //   2. MQTT connected → sends & receives work immediately
    let overlayTapped    = false;
    let overlayMqttReady = false;

    function mayDismissOverlay() {
      if (!overlayTapped || !overlayMqttReady) return;
      const ov = document.getElementById('overlay');
      if (!ov) return;
      ov.style.opacity = '0';
      ov.style.pointerEvents = 'none';
      setTimeout(() => ov.remove(), 300);
    }

    document.getElementById('overlay').addEventListener('pointerdown', () => {
      overlayTapped = true;
      // If MQTT not ready yet, update hint text so user knows we're waiting
      const hint = document.getElementById('overlay-hint');
      if (hint && !overlayMqttReady) hint.textContent = '接続中…';
      mayDismissOverlay();
    }, { once: true });

    // Solo/offline fallback: dismiss after 12 s regardless of MQTT state
    setTimeout(() => { overlayMqttReady = true; mayDismissOverlay(); }, 12_000);

    // ── Sound helpers ──

    function o(freq, type, t, vol, dur) {
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.type = type;
      osc.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(Math.min(vol * 0.55, 0.55), t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      osc.start(t); osc.stop(t + dur + 0.02);
    }

    function noise(t, dur, vol) {
      const len = Math.ceil(ctx.sampleRate * dur);
      const buf = ctx.createBuffer(1, len, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
      const src = ctx.createBufferSource(), g = ctx.createGain();
      src.buffer = buf; src.connect(g); g.connect(ctx.destination);
      g.gain.setValueAtTime(vol * 0.45, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      src.start(t);
    }

    function playSound(id) {
      // File sounds — HTML Audio ignores iOS mute switch
      if (id === 3) { hagemasuAudio.currentTime  = 0; hagemasuAudio.play().catch(() => {}); return; }
      if (id === 4) { wakaranaiAudio.currentTime = 0; wakaranaiAudio.play().catch(() => {}); return; }
      if (id === 8) { aoruAudio.currentTime      = 0; aoruAudio.play().catch(() => {}); return; }

      // Synthesized sounds — Web Audio API
      if (!ctx) return;
      if (ctx.state === 'suspended') {
        const ub = ctx.createBuffer(1, 1, ctx.sampleRate);
        const us = ctx.createBufferSource();
        us.buffer = ub; us.connect(ctx.destination); us.start(0);
        ctx.resume();
      }
      const t = ctx.currentTime + (ctx.state === 'running' ? 0.001 : 0.2);

      switch (id) {
        case 0: // なっとく
          o(523, 'sine', t, 0.9, 0.22);
          o(440, 'sine', t + 0.18, 0.7, 0.38);
          break;
        case 1: // びっくり
          o(1320, 'square', t, 0.5, 0.07);
          o(660,  'sine',   t + 0.04, 0.6, 0.28);
          break;
        case 2: // いいね
          o(523, 'sine', t,       0.7,  0.18);
          o(659, 'sine', t + 0.1, 0.75, 0.2);
          o(784, 'sine', t + 0.2, 0.9,  0.38);
          break;
        case 5: // しずかに
          o(220, 'sine', t,        0.25, 1.6);
          o(330, 'sine', t + 0.06, 0.18, 1.5);
          o(440, 'sine', t + 0.12, 0.12, 1.4);
          break;
        case 6: // わらう
          [0, 0.19, 0.38].forEach((dt, i) =>
            o(523 + i * 90, 'sine', t + dt, 0.85, 0.13));
          break;
        case 7: // パチパチ
          noise(t,        0.1, 0.85);
          noise(t + 0.22, 0.1, 0.85);
          noise(t + 0.44, 0.1, 0.85);
          break;
      }
    }

    // ── Build grid ──

    const BUTTONS = [
      'なっとく', 'びっくり', 'いいね',
      'はげます', 'わからない', 'しずかに',
      'わらう', 'パチパチ', 'あおる',
    ];

    const gridEl = document.getElementById('grid');
    const btnEls = [];

    BUTTONS.forEach((label, i) => {
      const btn = document.createElement('button');
      btn.className = 'btn';
      btn.textContent = label;
      btn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        tap(i, true);
      });
      gridEl.appendChild(btn);
      btnEls.push(btn);
    });

    function tap(id, isLocal) {
      playSound(id);
      if (isLocal) {
        flash(id, 'local');
        if (mqttClient?.connected) {
          mqttClient.publish(TOPIC_TAPS, JSON.stringify({ b: id, sid: SESSION_ID }));
        }
      }
    }

    function flash(id, cls) {
      const btn = btnEls[id];
      btn.classList.add(cls);
      setTimeout(() => btn.classList.remove(cls), cls === 'local' ? 200 : 420);
    }

    // ── Secret code playback ──
    function playSecretAudio(key) {
      const a = secretAudios.get(key);
      if (a) { a.currentTime = 0; a.play().catch(() => {}); }
    }

    function matchSecret(text) {
      const t = text.replace(/\s/g, '');
      return Object.keys(SECRET_CODES).find(k => k === t) ?? null;
    }

    // ── Text reading (50-on placeholder via speechSynthesis) ──
    // 一文字ずつキューに積む — send ボタンのクリックハンドラ内で呼ぶと
    // iOS Safari のジェスチャー制限を回避できる
    function speakText(text) {
      const chars = [...text].filter(c => /\S/.test(c));
      if (!chars.length) return;
      if (!('speechSynthesis' in window)) return;
      speechSynthesis.cancel();
      chars.forEach(char => {
        const utt = new SpeechSynthesisUtterance(char);
        utt.lang = 'ja-JP';
        utt.rate = 0.75;
        utt.pitch = 1.0;
        speechSynthesis.speak(utt);
      });
    }

    // send ボタン / Enter キー
    const textInput = document.getElementById('textInput');
    const sendBtn   = document.getElementById('sendBtn');

    function handleSend() {
      const text = textInput.value.trim();
      if (!text) return;
      const secret = matchSecret(text);
      if (secret) {
        playSecretAudio(secret);
      } else {
        speakText(text);
      }
      if (mqttClient?.connected) {
        mqttClient.publish(TOPIC_TEXTS, JSON.stringify({ text, sid: SESSION_ID }));
      }
      textInput.value = '';
    }

    sendBtn.addEventListener('click', handleSend);

    // ── Presence / listener count ──

    function updateListenerCount() {
      const now = Date.now();
      for (const [sid, ts] of presenceMap) {
        if (now - ts > 90_000) presenceMap.delete(sid);
      }
      const n = presenceMap.size;
      document.getElementById('listeners').textContent =
        n <= 1 ? '誰も聴いていません' : `${n} 人が聴いています`;
    }

    function publishPresence() {
      presenceMap.set(SESSION_ID, Date.now());
      updateListenerCount();
      if (mqttClient?.connected) {
        mqttClient.publish(TOPIC_PRESENCE, JSON.stringify({ sid: SESSION_ID }));
      }
    }

    // ── Status helper ──
    function setStatus(text, cls) {
      const el = document.getElementById('status');
      el.textContent = text;
      el.className = 'status' + (cls ? ' ' + cls : '');
      // Mirror to overlay while it still exists
      const oel = document.getElementById('overlay-status');
      if (oel) { oel.textContent = text; oel.className = cls || ''; }
    }

    // ── MQTT connection ──

    function initMQTT() {
      const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt', {
        clientId: `sg_${SESSION_ID}`,
        clean: true,
        connectTimeout: 10_000,
        reconnectPeriod: 3_000,
        // Last Will: ブラウザが突然閉じられたとき自動でleaveを通知
        will: {
          topic: TOPIC_PRESENCE,
          payload: JSON.stringify({ sid: SESSION_ID, leave: true }),
          qos: 0,
          retain: false,
        },
      });

      mqttClient = client;

      client.on('connect', () => {
        client.subscribe([TOPIC_TAPS, TOPIC_PRESENCE, TOPIC_TEXTS]);
        setStatus('接続済', 'is-connected');
        publishPresence();
        overlayMqttReady = true;
        mayDismissOverlay();
      });

      client.on('reconnect', () => {
        setStatus('再接続中…', 'is-reconnecting');
      });

      client.on('offline', () => {
        setStatus('— offline —');
      });

      client.on('message', (topic, payload) => {
        let msg;
        try { msg = JSON.parse(payload.toString()); } catch { return; }

        if (topic === TOPIC_TAPS) {
          if (msg.sid !== SESSION_ID) tap(msg.b, false);

        } else if (topic === TOPIC_TEXTS) {
          if (msg.sid !== SESSION_ID && msg.text) {
            const secret = matchSecret(msg.text);
            if (secret) playSecretAudio(secret); else speakText(msg.text);
          }

        } else if (topic === TOPIC_PRESENCE) {
          if (msg.leave) {
            presenceMap.delete(msg.sid);
          } else {
            presenceMap.set(msg.sid, Date.now());
          }
          updateListenerCount();
        }
      });

      // presence heartbeat every 20s
      setInterval(publishPresence, 20_000);

      window.addEventListener('beforeunload', () => {
        client.publish(
          TOPIC_PRESENCE,
          JSON.stringify({ sid: SESSION_ID, leave: true }),
          { qos: 0 }
        );
      });
    }

    try {
      initMQTT();
    } catch (e) {
      // MQTT library not available — solo mode (sounds still work locally)
      setStatus('— solo mode —');
    }
  </script>
</body>
</html>
